name: publish-npm

# Build the wasm-pack bundler package (wasm/ -> wasm/pkg) and publish it to npmjs.
# Auth uses the org-level NPM_TOKEN secret (must be granted to this repo in the org
# secret's repository-access list). Runs when a GitHub Release is published, or on
# manual dispatch.
on:
  release:
    types: [published]
  workflow_dispatch: {}

# Serialize publishes; never cancel an in-flight one.
concurrency:
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: build wasm + npm publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: jetli/wasm-pack-action@0d2e8b7bef80f55b602e9d6cf6df40f30e1a3a4f # v0.4.0
        with:
          version: latest
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: build wasm package (wasm-pack bundler -> wasm/pkg)
        working-directory: wasm
        run: npm run build:bundler
      - name: publish to npmjs
        working-directory: wasm
        run: npm publish ./pkg --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
